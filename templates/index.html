<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="page">
      <header class="header">
        <div>
          <p class="label">Telegram Mini App</p>
          <h1>{{ app_name }}</h1>
        </div>
        <div class="balance">
          <span>Demo balance</span>
          <strong>10 000 RUB</strong>
        </div>
      </header>

      <section class="status">
        <span>Backend: online</span>
        <span>Supabase: {{ "configured" if has_supabase else "not configured" }}</span>
        <span>Telegram: {{ "configured" if has_telegram else "not configured" }}</span>
      </section>

      <section class="grid">
        <article class="event">
          <div class="meta">
            <span>Football</span>
            <time>Today, 20:30</time>
          </div>
          <h2>Moscow vs Petersburg</h2>
          <div class="odds">
            <button>P1 <strong>1.92</strong></button>
            <button>X <strong>3.35</strong></button>
            <button>P2 <strong>4.10</strong></button>
          </div>
        </article>

        <article class="event">
          <div class="meta">
            <span>Tennis</span>
            <time>Tomorrow, 15:00</time>
          </div>
          <h2>Ivanov vs Smirnov</h2>
          <div class="odds">
            <button>P1 <strong>1.68</strong></button>
            <button>P2 <strong>2.24</strong></button>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
