<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Telegram Mini App</p>
          <h1>{{ app_name }}</h1>
        </div>
        <div class="profile">
          <span id="user-name">Demo</span>
          <strong id="balance">10 000 ₽</strong>
        </div>
      </header>

      <section class="status" id="status">Загрузка демо линии...</section>

      <section class="layout">
        <div class="events" id="events"></div>

        <aside class="ticket">
          <h2>Купон</h2>
          <div id="ticket-empty" class="muted">Выберите исход, чтобы собрать демо ставку.</div>
          <div id="ticket-form" hidden>
            <p class="muted" id="ticket-event"></p>
            <div class="ticket-row">
              <span id="ticket-outcome"></span>
              <strong id="ticket-odd"></strong>
            </div>
            <label>
              Сумма ставки
              <input id="stake" type="number" min="50" step="50" value="500" />
            </label>
            <div class="ticket-row">
              <span>Возможный выигрыш</span>
              <strong id="possible-win"></strong>
            </div>
            <button class="primary" id="place-bet">Поставить</button>
          </div>
        </aside>
      </section>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
