<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="page">
      <header class="header">
        <div>
          <p class="label">Telegram Mini App</p>
          <h1>{{ app_name }}</h1>
        </div>
        <div class="balance">
          <span id="profile-name">Загрузка</span>
          <strong id="balance-value">DEMO 0</strong>
        </div>
      </header>

      <nav class="tabs">
        <button class="tab active" data-tab="events">Линия</button>
        <button class="tab" data-tab="bets">Мои ставки</button>
        <button class="tab admin-only" data-tab="admin" hidden>Админка</button>
        <button class="tab admin-only" data-tab="users" hidden>Пользователи</button>
      </nav>

      <section class="status" id="status">Инициализация приложения...</section>
      <section class="debug-panel" id="admin-debug" hidden></section>

      <section class="view active" id="view-events">
        <div class="layout">
          <div class="grid" id="events"></div>
          <aside class="ticket">
            <h2>Купон</h2>
            <div id="ticket-empty" class="muted">Выберите исход, чтобы сделать демо-ставку.</div>
            <div id="ticket-form" hidden>
              <p class="muted" id="ticket-event"></p>
              <div class="ticket-row">
                <span id="ticket-selection"></span>
                <strong id="ticket-price"></strong>
              </div>
              <label>
                Сумма
                <input id="stake" type="number" min="10" step="10" value="100">
              </label>
              <div class="ticket-row">
                <span>Возможный выигрыш</span>
                <strong id="ticket-win"></strong>
              </div>
              <button class="primary" id="place-bet">Поставить</button>
            </div>
          </aside>
        </div>
      </section>

      <section class="view" id="view-bets">
        <div class="grid" id="bets"></div>
      </section>

      <section class="view" id="view-admin">
        <div class="admin-actions">
          <button class="primary" id="sync-odds">Обновить матчи и коэффициенты</button>
          <button id="refresh-usage">Обновить статистику Odds API</button>
        </div>
        <div class="admin-grid">
          <article class="panel">
            <h2>Обзор</h2>
            <div id="admin-dashboard" class="stack"></div>
          </article>
          <article class="panel">
            <h2>Последние sync</h2>
            <div id="sync-runs" class="stack"></div>
          </article>
        </div>
      </section>

      <section class="view" id="view-users">
        <div class="admin-actions">
          <button class="primary" id="open-create-user">Добавить пользователя</button>
        </div>
        <div class="grid" id="admin-users"></div>
      </section>
    </main>

    <div class="modal" id="create-user-modal" hidden>
      <form class="modal-body" id="create-user-form">
        <div class="modal-head">
          <h2>Добавить пользователя</h2>
          <button type="button" id="close-create-user">Закрыть</button>
        </div>
        <label>
          Имя
          <input name="first_name" required autocomplete="off">
        </label>
        <label>
          Фамилия
          <input name="last_name" autocomplete="off">
        </label>
        <label>
          Баланс DEMO
          <input name="balance" type="number" min="0" step="10" value="1000" required>
        </label>
        <button class="primary" type="submit">Создать</button>
      </form>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
